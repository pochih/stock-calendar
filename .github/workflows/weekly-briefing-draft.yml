name: Weekly briefing draft reminder

on:
  schedule:
    # 每週日 13:00 UTC (台北週日 21:00) — 一週節目都結束後
    - cron: '0 13 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: weekly-briefing-draft
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run prepare_briefing.py
        id: prepare
        run: |
          # 預設用 ISO 週數
          OUT=$(python prepare_briefing.py 2>&1)
          echo "$OUT"
          # 抽出 week 編號 (從 "📅 2026-WXX: ..." 抽)
          WEEK=$(echo "$OUT" | grep -oE '20[0-9]{2}-W[0-9]+' | head -1)
          YEAR=$(echo "$WEEK" | cut -d- -f1)
          WEEK_NUM=$(echo "$WEEK" | cut -d- -f2 | sed 's/W//')
          echo "week=$WEEK" >> $GITHUB_OUTPUT
          echo "year=$YEAR" >> $GITHUB_OUTPUT
          echo "week_num=$WEEK_NUM" >> $GITHUB_OUTPUT
          # context 檔路徑
          CONTEXT=drafts/W${WEEK_NUM}_${YEAR}_context.md
          if [ -f "$CONTEXT" ]; then
            echo "context_path=$CONTEXT" >> $GITHUB_OUTPUT
            # 限制 issue body 大小 (~50KB GitHub upper bound)
            head -c 50000 "$CONTEXT" > /tmp/issue_body.md
            echo "" >> /tmp/issue_body.md
            echo "" >> /tmp/issue_body.md
            echo "---" >> /tmp/issue_body.md
            echo "_完整 context 在分支 draft-${WEEK} (workflow run 結束後 push)_" >> /tmp/issue_body.md
          else
            echo "❌ 找不到 context: $CONTEXT" >&2
            exit 1
          fi

      - name: Open GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEEK: ${{ steps.prepare.outputs.week }}
        run: |
          # 檢查是否已有同名 Issue (避免重複)
          EXISTING=$(gh issue list --search "in:title \"Weekly briefing draft: $WEEK\"" --json number -q '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING 已存在,跳過"
            exit 0
          fi
          gh issue create \
            --title "📰 Weekly briefing draft: $WEEK" \
            --label "weekly-briefing,draft" \
            --body-file /tmp/issue_body.md \
            --assignee pochih

      - name: Push draft context to branch
        env:
          WEEK: ${{ steps.prepare.outputs.week }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          BRANCH="draft-${WEEK}"
          git checkout -b "$BRANCH"
          # drafts/ 在 .gitignore 內,用 -f 強制 add 到此 branch
          git add -f drafts/
          if git diff --cached --quiet; then
            echo "No draft changes"
            exit 0
          fi
          git commit -m "draft: ${WEEK} weekly briefing context"
          git push -u origin "$BRANCH" || true
