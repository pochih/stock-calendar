name: Update market data

on:
  schedule:
    # 美東 09:35 ET pre-market = 13:35 UTC (夏令) / 14:35 UTC (冬令) — 抓開盤跳空
    # 美東 16:10 ET 收盤後 = 20:10 UTC (夏令) / 21:10 UTC (冬令) — 抓當日收盤
    # GitHub cron 用 UTC 固定,故夏冬都各偏 30 分,實際抓到的價格仍有效
    - cron: '35 13 * * 1-5'
    - cron: '10 21 * * 1-5'
  workflow_dispatch:  # 允許在 Actions 頁手動觸發

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run update_data.py --all
        run: python update_data.py --all

      - name: Embed data.json into index.html
        run: |
          python - <<'PY'
          import re, pathlib
          html_path = pathlib.Path('index.html')
          data_json = pathlib.Path('data.json').read_text(encoding='utf-8')
          html = html_path.read_text(encoding='utf-8')
          pattern = re.compile(
              r'/\*__EMBEDDED_DATA_START__\*/[\s\S]*?/\*__EMBEDDED_DATA_END__\*/'
          )
          if not pattern.search(html):
              raise SystemExit('EMBEDDED_DATA placeholder not found')
          replacement = f'/*__EMBEDDED_DATA_START__*/{data_json}/*__EMBEDDED_DATA_END__*/'
          # 用 lambda 避免 re.sub 把 replacement string 內的 \n / \t 當 escape 處理
          new = pattern.sub(lambda _m: replacement, html)
          if new != html:
              html_path.write_text(new, encoding='utf-8')
              print('embedded data.json into index.html')
          PY

      - name: Commit + push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data.json index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          VERSION=$(python -c "import json; print(json.load(open('data.json'))['_meta']['version'])")
          git commit -m "chore: auto-update market data v${VERSION}"
          git push

      # GITHUB_TOKEN push 不會觸發其他 workflow,所以這裡直接 deploy Pages
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
