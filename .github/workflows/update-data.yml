name: Update market data

on:
  schedule:
    # 美東收盤 16:00 ET (UTC-5 = 21:00 UTC 夏令 / 21:00 UTC 冬令的差 1 小時)
    # 用 22:10 UTC 給 yfinance 緩衝;週一到週五跑
    - cron: '10 22 * * 1-5'
  workflow_dispatch:  # 允許在 Actions 頁手動觸發

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run update_data.py --all
        run: python update_data.py --all

      - name: Embed data.json into index.html
        run: |
          python - <<'PY'
          import json, re, pathlib
          html_path = pathlib.Path('index.html')
          data_json = pathlib.Path('data.json').read_text(encoding='utf-8')
          html = html_path.read_text(encoding='utf-8')
          pattern = re.compile(
              r'/\*__EMBEDDED_DATA_START__\*/[\s\S]*?/\*__EMBEDDED_DATA_END__\*/'
          )
          if not pattern.search(html):
              raise SystemExit('EMBEDDED_DATA placeholder not found')
          new = pattern.sub(
              f'/*__EMBEDDED_DATA_START__*/{data_json}/*__EMBEDDED_DATA_END__*/',
              html,
          )
          if new != html:
              html_path.write_text(new, encoding='utf-8')
              print('embedded data.json into index.html')
          PY

      - name: Commit + push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data.json index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          VERSION=$(python -c "import json; print(json.load(open('data.json'))['_meta']['version'])")
          git commit -m "chore: auto-update market data v${VERSION}"
          git push
